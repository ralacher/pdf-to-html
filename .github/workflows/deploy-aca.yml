# ──────────────────────────────────────────────────────────────
# Deploy to Azure Container Apps
# Builds backend + frontend images via ACR Tasks, then updates
# the three Container Apps (API, Worker, Frontend).
# ──────────────────────────────────────────────────────────────
name: Deploy to Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write          # Required for OIDC-based Azure login

env:
  RESOURCE_GROUP: rg-pdftohtml
  ACR_NAME: crpdftohtml
  ACR_LOGIN_SERVER: crpdftohtml.azurecr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Azure Login ──────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Build Images via ACR Tasks ───────────────────────
      - name: Build backend image
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image pdf-to-html-api:${{ env.IMAGE_TAG }} \
            --image pdf-to-html-api:latest \
            --file Dockerfile.backend .

      - name: Get API FQDN
        id: api-fqdn
        run: |
          FQDN=$(az containerapp show \
            --name ca-pdftohtml-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Build frontend image
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image pdf-to-html-frontend:${{ env.IMAGE_TAG }} \
            --image pdf-to-html-frontend:latest \
            --build-arg BACKEND_URL=${{ steps.api-fqdn.outputs.url }} \
            --file frontend/Dockerfile frontend/

      # ── Deploy Container Apps ────────────────────────────
      - name: Deploy API
        run: |
          az containerapp update \
            --name ca-pdftohtml-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/pdf-to-html-api:${{ env.IMAGE_TAG }}

      - name: Deploy Worker
        run: |
          az containerapp update \
            --name ca-pdftohtml-worker \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/pdf-to-html-api:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ca-pdftohtml-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/pdf-to-html-frontend:${{ env.IMAGE_TAG }}

      # ── Smoke Test ───────────────────────────────────────
      - name: Smoke test API health
        run: |
          API_FQDN=$(az containerapp show \
            --name ca-pdftohtml-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "API endpoint: https://$API_FQDN"

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$API_FQDN/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ API health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::warning::API health check did not return 200 within 100s"
