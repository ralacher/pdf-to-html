<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to HTML Converter</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #dee2e6;
            --primary: #0d6efd;
            --primary-hover: #0b5ed7;
            --text: #212529;
            --text-muted: #6c757d;
            --success: #198754;
            --danger: #dc3545;
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface);
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--primary);
            background: #e7f1ff;
        }

        .drop-zone-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .drop-zone-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .drop-zone-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Progress */
        .progress-container {
            display: none;
            margin-top: 1.5rem;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar-track {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
            animation: indeterminate 1.5s infinite;
        }

        @keyframes indeterminate {
            0% { width: 0%; margin-left: 0; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0%; margin-left: 100%; }
        }

        .progress-text {
            margin-top: 0.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Results panel */
        .results {
            display: none;
            margin-top: 2rem;
        }

        .results.active {
            display: block;
        }

        .results-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .results-stats {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .stat {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat strong {
            color: var(--text);
        }

        .results-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--bg);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        /* Tab switcher */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 0;
        }

        .tab {
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.15s;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Preview / Source views */
        .tab-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            min-height: 400px;
        }

        .preview-frame {
            width: 100%;
            min-height: 600px;
            border: none;
            display: block;
        }

        .source-view {
            display: none;
            padding: 1rem;
            overflow-x: auto;
        }

        .source-view pre {
            margin: 0;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            max-height: 600px;
            overflow-y: auto;
        }

        /* Error */
        .error-banner {
            display: none;
            padding: 1rem 1.25rem;
            background: #f8d7da;
            border: 1px solid #f5c2c7;
            border-radius: var(--radius);
            color: var(--danger);
            margin-top: 1.5rem;
        }

        .error-banner.active {
            display: block;
        }

        /* Reset button */
        .reset-row {
            text-align: center;
            margin-top: 1rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .results-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .results-actions {
                justify-content: stretch;
            }
            .results-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF to HTML Converter</h1>
            <p>Drop a PDF to convert it into accessible, semantic HTML</p>
        </header>

        <!-- Upload area -->
        <div class="drop-zone" id="dropZone">
            <span class="drop-zone-icon">📄</span>
            <div class="drop-zone-text">Drag &amp; drop a PDF here, or click to browse</div>
            <div class="drop-zone-hint">Max file size: 50 MB</div>
            <input type="file" id="fileInput" accept=".pdf,application/pdf">
        </div>

        <!-- Progress -->
        <div class="progress-container" id="progress">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Uploading and converting…</div>
        </div>

        <!-- Error -->
        <div class="error-banner" id="errorBanner"></div>

        <!-- Results -->
        <div class="results" id="results">
            <div class="results-toolbar">
                <div class="results-stats" id="statsRow"></div>
                <div class="results-actions">
                    <button class="btn" id="btnCopyHtml" title="Copy HTML source to clipboard">📋 Copy HTML</button>
                    <button class="btn btn-primary" id="btnDownload">⬇ Download ZIP</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="preview">Preview</button>
                <button class="tab" data-tab="source">HTML Source</button>
            </div>
            <div class="tab-content">
                <iframe class="preview-frame" id="previewFrame" sandbox="allow-same-origin" title="Converted HTML preview"></iframe>
                <div class="source-view" id="sourceView">
                    <pre><code id="sourceCode"></code></pre>
                </div>
            </div>

            <div class="reset-row">
                <button class="btn" id="btnReset">Convert another PDF</button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progress = document.getElementById('progress');
        const progressText = document.getElementById('progressText');
        const errorBanner = document.getElementById('errorBanner');
        const results = document.getElementById('results');
        const statsRow = document.getElementById('statsRow');
        const previewFrame = document.getElementById('previewFrame');
        const sourceCode = document.getElementById('sourceCode');
        const sourceView = document.getElementById('sourceView');

        let currentFile = null;
        let currentHtml = '';

        // --- Drag & drop ---
        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
        });

        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });
        });

        dropZone.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
        });

        // --- Convert ---
        async function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showError('Please upload a PDF file.');
                return;
            }

            currentFile = file;
            hideError();
            results.classList.remove('active');
            progress.classList.add('active');
            progressText.textContent = `Converting ${file.name} (${(file.size / 1024).toFixed(0)} KB)…`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const resp = await fetch('/api/convert', { method: 'POST', body: formData });
                const data = await resp.json();

                if (!resp.ok) {
                    showError(data.error || 'Conversion failed.');
                    progress.classList.remove('active');
                    return;
                }

                currentHtml = data.html;
                showResults(data);
            } catch (err) {
                showError('Network error — is the server running?');
            } finally {
                progress.classList.remove('active');
            }
        }

        function showResults(data) {
            // Stats
            statsRow.innerHTML = `
                <span class="stat"><strong>${data.pages}</strong> page${data.pages !== 1 ? 's' : ''}</span>
                <span class="stat"><strong>${data.digital_pages}</strong> digital</span>
                <span class="stat"><strong>${data.scanned_pages}</strong> scanned</span>
                <span class="stat"><strong>${data.images}</strong> image${data.images !== 1 ? 's' : ''}</span>
                <span class="stat"><strong>${data.elapsed}s</strong> elapsed</span>
                ${!data.ocr_available && data.scanned_pages > 0
                    ? '<span class="stat" style="color:var(--danger)">⚠ OCR not configured</span>'
                    : ''}
            `;

            // Preview iframe
            const blob = new Blob([data.html], { type: 'text/html' });
            previewFrame.src = URL.createObjectURL(blob);

            // Source view
            sourceCode.textContent = data.html;

            results.classList.add('active');

            // Switch to preview tab
            switchTab('preview');
        }

        // --- Tabs ---
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t =>
                t.classList.toggle('active', t.dataset.tab === name));
            previewFrame.style.display = name === 'preview' ? 'block' : 'none';
            sourceView.style.display = name === 'source' ? 'block' : 'none';
        }

        // --- Copy ---
        document.getElementById('btnCopyHtml').addEventListener('click', async () => {
            if (!currentHtml) return;
            await navigator.clipboard.writeText(currentHtml);
            const btn = document.getElementById('btnCopyHtml');
            const orig = btn.innerHTML;
            btn.innerHTML = '✓ Copied!';
            setTimeout(() => btn.innerHTML = orig, 2000);
        });

        // --- Download ---
        document.getElementById('btnDownload').addEventListener('click', async () => {
            if (!currentFile) return;
            const btn = document.getElementById('btnDownload');
            btn.disabled = true;
            btn.innerHTML = '⏳ Preparing…';

            const formData = new FormData();
            formData.append('file', currentFile);

            try {
                const resp = await fetch('/api/download', { method: 'POST', body: formData });
                if (!resp.ok) throw new Error('Download failed');

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = currentFile.name.replace(/\.pdf$/i, '') + '.zip';
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                showError('Download failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '⬇ Download ZIP';
            }
        });

        // --- Reset ---
        document.getElementById('btnReset').addEventListener('click', () => {
            results.classList.remove('active');
            fileInput.value = '';
            currentFile = null;
            currentHtml = '';
        });

        // --- Error helpers ---
        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.add('active');
        }

        function hideError() {
            errorBanner.classList.remove('active');
        }
    </script>
</body>
</html>
